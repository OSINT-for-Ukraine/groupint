# Docker Desktop stack (see scripts/up-desktop.sh).
services:
  neo4j:
    container_name: ${APP_NAME}-neo4j
    image: neo4j
    # Host 7474/7473 are often held by stale docker-proxy; use high ports unless you cleared them.
    ports:
      - "17474:7474"
      - "17687:7687"
    volumes:
      - groupint-neo4j-data:/data
      - groupint-neo4j-logs:/logs
      - groupint-neo4j-import:/var/lib/neo4j/import
      - groupint-neo4j-plugins:/plugins
    environment:
      - NEO4J_AUTH=none
      - NEO4J_dbms_security_procedures_unrestricted=gds.*
      # So Browser on the host connects to published ports, not container-internal names.
      - NEO4J_server_default__listen__address=0.0.0.0
      - NEO4J_dbms_connector_bolt_advertised__address=localhost:17687
      - NEO4J_dbms_connector_http_advertised__address=localhost:17474
    restart: always
  streamlit:
    container_name: groupint-streamlit
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - HOST=localhost
      - NEO4J_URI=bolt://${APP_NAME}-neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=difficulties-pushup-gaps
      - APP_NAME=${APP_NAME}
      - GROUPINT_SESSIONS_DIR=/home/appuser/.groupint/sessions
      - NEO4J_BROWSER_URL=http://localhost:17474/browser/
      - NEO4J_BROWSER_CONNECT_URL=bolt://localhost:17687
      - NEO4J_BROWSER_DATABASE=neo4j
      - NEO4J_BROWSER_AUTH_METHOD=NO_AUTH
      - INCIDENT_LLM_PROVIDER=${INCIDENT_LLM_PROVIDER:-anthropic}
      - INCIDENT_LLM_MODEL=${INCIDENT_LLM_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
    restart: always
    # Host 8501 is often held by a stale docker-proxy from an old run; use 18501 or restart Docker.
    ports:
      - "18501:8501"
    volumes:
      - .:/app
      - groupint-telegram-session:/home/appuser/.groupint
    depends_on:
      - neo4j
  incident-worker:
    container_name: groupint-incident-worker
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/incident-worker.py"]
    env_file:
      - .env
    healthcheck:
      disable: true
    environment:
      - NEO4J_URI=bolt://${APP_NAME}-neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=difficulties-pushup-gaps
      - GROUPINT_SESSIONS_DIR=/home/appuser/.groupint/sessions
      - INCIDENT_POLL_INTERVAL_SEC=${INCIDENT_POLL_INTERVAL_SEC:-300}
      - INCIDENT_LLM_PROVIDER=${INCIDENT_LLM_PROVIDER:-anthropic}
      - INCIDENT_LLM_MODEL=${INCIDENT_LLM_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE:-}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-}
    volumes:
      - .:/app
      - groupint-telegram-session:/home/appuser/.groupint
    depends_on:
      - neo4j
    restart: unless-stopped

volumes:
  groupint-telegram-session:
  groupint-neo4j-data:
  groupint-neo4j-logs:
  groupint-neo4j-import:
  groupint-neo4j-plugins:
